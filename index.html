<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Farmasi Registration</title>

  <style>
    * { box-sizing: border-box; }

    :root {
      --bg1: #fff1f4;
      --bg2: #ffdce3;
      --primary-dark: #df3f5b;
      --primary-light: #ff7f91;
      --text: #2c2430;
      --muted: #6c6771;
      --shadow: 0 18px 40px rgba(33, 18, 24, 0.18);
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, sans-serif;
      color: var(--text);
    }

    body {
      min-height: 100svh;
      background:
        radial-gradient(circle at 15% 10%, rgba(255,255,255,0.85), transparent 24%),
        radial-gradient(circle at 85% 90%, rgba(255,255,255,0.55), transparent 22%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      overflow-x: hidden;
      position: relative;
    }

    .money-rain {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .note {
      position: absolute;
      top: -240px;
      width: 170px;
      opacity: 0.96;
      filter:
        drop-shadow(0 16px 28px rgba(0,0,0,0.34))
        brightness(1.18)
        contrast(1.22)
        saturate(1.15);
      transform-origin: center center;
    }

    .note.n1  { left: 1%;  animation: fall1 8.5s linear infinite 0s; }
    .note.n2  { left: 7%;  animation: fall2 7.2s linear infinite .8s; }
    .note.n3  { left: 13%; animation: fall3 9.4s linear infinite 1.8s; }
    .note.n4  { left: 19%; animation: fall4 8.6s linear infinite .5s; }
    .note.n5  { left: 25%; animation: fall5 9.8s linear infinite 1.2s; }
    .note.n6  { left: 31%; animation: fall6 7.4s linear infinite 2.2s; }
    .note.n7  { left: 37%; animation: fall7 8.8s linear infinite .7s; }
    .note.n8  { left: 43%; animation: fall2 7.8s linear infinite 1.4s; }
    .note.n9  { left: 49%; animation: fall5 9.5s linear infinite .9s; }
    .note.n10 { left: 55%; animation: fall1 8.8s linear infinite 1.7s; }
    .note.n11 { left: 61%; animation: fall6 10.8s linear infinite 2.3s; }
    .note.n12 { left: 67%; animation: fall3 7.8s linear infinite .4s; }
    .note.n13 { left: 73%; animation: fall4 8.6s linear infinite 1.1s; }
    .note.n14 { left: 79%; animation: fall7 7.4s linear infinite 2s; }
    .note.n15 { left: 85%; animation: fall1 9.5s linear infinite 2.7s; }
    .note.n16 { left: 91%; animation: fall2 8.9s linear infinite 1.6s; }
    .note.n17 { left: 4%;  animation: fall3 8.2s linear infinite .6s; }
    .note.n18 { left: 10%; animation: fall6 9.1s linear infinite 1.3s; }
    .note.n19 { left: 16%; animation: fall1 7.7s linear infinite 2.1s; }
    .note.n20 { left: 22%; animation: fall5 8.4s linear infinite .9s; }
    .note.n21 { left: 78%; animation: fall2 8.5s linear infinite 1.8s; }
    .note.n22 { left: 84%; animation: fall7 7.9s linear infinite .4s; }
    .note.n23 { left: 90%; animation: fall4 9.7s linear infinite 2.2s; }
    .note.n24 { left: 96%; animation: fall6 8.8s linear infinite 1.1s; }

    @keyframes fall1 {
      0% { transform: translate(-14px,-240px) rotate(0deg) scale(1.06); opacity: 0; }
      10% { opacity: .96; }
      30% { transform: translate(38px,28vh) rotate(14deg) scale(1.1); }
      60% { transform: translate(-18px,62vh) rotate(-10deg) scale(1.02); }
      100% { transform: translate(22px,120vh) rotate(22deg) scale(.96); opacity: 0; }
    }

    @keyframes fall2 {
      0% { transform: translate(12px,-240px) rotate(0deg) scale(.95); opacity: 0; }
      14% { opacity: .86; }
      52% { transform: translate(-30px,56vh) rotate(-12deg) scale(1.04); }
      100% { transform: translate(25px,120vh) rotate(18deg) scale(.92); opacity: 0; }
    }

    @keyframes fall3 {
      0% { transform: translate(-10px,-240px) rotate(0deg) scale(1.08); opacity: 0; }
      15% { opacity: .98; }
      40% { transform: translate(30px,40vh) rotate(16deg) scale(1.12); }
      75% { transform: translate(-26px,88vh) rotate(-13deg) scale(1.00); }
      100% { transform: translate(16px,120vh) rotate(20deg) scale(.94); opacity: 0; }
    }

    @keyframes fall4 {
      0% { transform: translate(0,-240px) rotate(0deg) scale(.92); opacity: 0; }
      12% { opacity: .84; }
      50% { transform: translate(-34px,58vh) rotate(-14deg) scale(1.03); }
      100% { transform: translate(24px,120vh) rotate(20deg) scale(.9); opacity: 0; }
    }

    @keyframes fall5 {
      0% { transform: translate(14px,-240px) rotate(0deg) scale(1.04); opacity: 0; }
      14% { opacity: .95; }
      42% { transform: translate(-20px,44vh) rotate(-10deg) scale(1.08); }
      100% { transform: translate(30px,120vh) rotate(16deg) scale(.94); opacity: 0; }
    }

    @keyframes fall6 {
      0% { transform: translate(-18px,-240px) rotate(0deg) scale(.96); opacity: 0; }
      14% { opacity: .86; }
      60% { transform: translate(28px,68vh) rotate(13deg) scale(1.06); }
      100% { transform: translate(-16px,120vh) rotate(-19deg) scale(.9); opacity: 0; }
    }

    @keyframes fall7 {
      0% { transform: translate(8px,-240px) rotate(0deg) scale(1.1); opacity: 0; }
      10% { opacity: .98; }
      48% { transform: translate(-22px,50vh) rotate(-11deg) scale(1.14); }
      100% { transform: translate(20px,120vh) rotate(18deg) scale(.95); opacity: 0; }
    }

    .page-wrap {
      min-height: 100svh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 8px;
      position: relative;
      z-index: 2;
    }

    .card {
      width: 100%;
      max-width: 420px;
      background: rgba(255,255,255,0.60);
      border-radius: 28px;
      padding: 14px;
      text-align: center;
      box-shadow:
        0 20px 50px rgba(33, 18, 24, 0.18),
        inset 0 1px 0 rgba(255,255,255,0.55);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.55);
    }

    .logo-wrap {
      position: relative;
      width: 158px;
      height: 60px;
      margin: 0 auto 4px;
    }

    .logo {
      width: 120px;
      position: absolute;
      left: 14px;
      top: 1px;
    }

    h2 {
      margin: 2px 0 4px;
      font-size: 19px;
      line-height: 1.08;
    }

    .subtitle {
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 7px;
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      margin-bottom: 8px;
    }

    .stat-box {
      background: rgba(255,255,255,0.55);
      border: 1px solid rgba(223,63,91,0.14);
      border-radius: 12px;
      padding: 8px 4px;
    }

    .stat-num {
      font-size: 16px;
      font-weight: 800;
      color: var(--primary-dark);
      margin-bottom: 2px;
    }

    .stat-label {
      font-size: 10px;
      color: var(--muted);
    }

    .countdown-calendar {
      margin: 10px 0 10px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255,255,255,0.42);
      border: 1px solid rgba(223,63,91,0.18);
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.45);
    }

    .cd-box {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(223,63,91,0.12);
      border-radius: 14px;
      padding: 10px 6px;
      text-align: center;
      box-shadow: 0 6px 18px rgba(223,63,91,0.08);
    }

    .cd-box span {
      display: block;
      font-size: 24px;
      font-weight: 800;
      color: #df3f5b;
      line-height: 1;
    }

    .cd-box small {
      display: block;
      margin-top: 6px;
      font-size: 11px;
      color: #6c6771;
    }

    .event {
      background: rgba(255,255,255,0.34);
      border: 1px solid rgba(223,63,91,0.18);
      border-radius: 14px;
      padding: 9px 10px;
      text-align: left;
      margin-bottom: 8px;
      font-size: 12px;
      line-height: 1.5;
    }

    .event b {
      color: var(--primary-dark);
      display: block;
      margin-bottom: 4px;
      font-size: 13px;
    }

    input {
      width: 100%;
      padding: 11px 10px;
      margin: 4px 0;
      border-radius: 12px;
      border: 1px solid rgba(80,80,95,0.12);
      font-size: 14px;
      background: rgba(255,255,255,0.88);
      outline: none;
    }

    button {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 14px;
      background: linear-gradient(135deg, #d92f52, #ff7f91);
      color: white;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      box-shadow: 0 12px 24px rgba(223,63,91,0.28);
      transition: transform .18s ease, box-shadow .18s ease, opacity .18s ease;
      animation: pulseBtn 1.8s infinite;
    }

    button:hover {
      transform: translateY(-1px) scale(1.01);
      box-shadow: 0 16px 28px rgba(223,63,91,0.34);
    }

    button:disabled {
      opacity: .7;
      cursor: not-allowed;
      animation: none;
    }

    @keyframes pulseBtn {
      0% { transform: scale(1); }
      50% { transform: scale(1.025); }
      100% { transform: scale(1); }
    }

    .msg {
      margin-top: 10px;
      display: none;
      font-weight: 800;
      font-size: 13px;
      padding: 10px 12px;
      border-radius: 12px;
    }

    .success {
      color: #178c45;
      background: rgba(23,140,69,0.10);
      border: 1px solid rgba(23,140,69,0.18);
    }

    .error {
      color: #d73d51;
      background: rgba(215,61,81,0.10);
      border: 1px solid rgba(215,61,81,0.18);
    }

    .trust-line {
      margin-top: 8px;
      font-size: 11px;
      color: #6c6771;
      text-align: center;
    }

    #musicBtn {
      position: fixed;
      right: 8px;
      bottom: 8px;
      width: auto;
      min-width: 90px;
      padding: 9px 11px;
      border-radius: 14px;
      background: linear-gradient(135deg, var(--primary-dark), var(--primary-light));
      z-index: 5;
      font-size: 12px;
      color: white;
      border: none;
      cursor: pointer;
      animation: none;
    }

    .live-popup {
      position: fixed;
      left: 50%;
      bottom: 58px;
      transform: translateX(-50%);
      background: linear-gradient(135deg, #df3f5b, #ff8090);
      color: white;
      padding: 10px 14px;
      border-radius: 14px;
      font-size: 12px;
      font-weight: 700;
      z-index: 9999;
      opacity: 0;
      animation: popupInOut 2.8s ease forwards;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    }

    @keyframes popupInOut {
      0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
      15% { opacity: 1; transform: translateX(-50%) translateY(0); }
      80% { opacity: 1; transform: translateX(-50%) translateY(0); }
      100% { opacity: 0; transform: translateX(-50%) translateY(10px); }
    }

    @media (max-width: 480px) {
      .note { width: 120px; opacity: 0.88; }
      .card { max-width: 96vw; }
      .countdown-calendar { gap: 6px; padding: 8px 6px; }
      .cd-box span { font-size: 17px; }
      .cd-box small { font-size: 10px; }
    }
  </style>
</head>
<body>

  <div class="money-rain">
    <img src="gel100.png" class="note n1" alt="">
    <img src="usd100.png" class="note n2" alt="">
    <img src="gel200.png" class="note n3" alt="">
    <img src="gel100.png" class="note n4" alt="">
    <img src="usd100.png" class="note n5" alt="">
    <img src="gel200.png" class="note n6" alt="">
    <img src="gel100.png" class="note n7" alt="">
    <img src="usd100.png" class="note n8" alt="">
    <img src="gel200.png" class="note n9" alt="">
    <img src="gel100.png" class="note n10" alt="">
    <img src="usd100.png" class="note n11" alt="">
    <img src="gel200.png" class="note n12" alt="">
    <img src="gel100.png" class="note n13" alt="">
    <img src="usd100.png" class="note n14" alt="">
    <img src="gel200.png" class="note n15" alt="">
    <img src="gel100.png" class="note n16" alt="">
    <img src="usd100.png" class="note n17" alt="">
    <img src="gel200.png" class="note n18" alt="">
    <img src="gel100.png" class="note n19" alt="">
    <img src="usd100.png" class="note n20" alt="">
    <img src="gel200.png" class="note n21" alt="">
    <img src="gel100.png" class="note n22" alt="">
    <img src="usd100.png" class="note n23" alt="">
    <img src="gel200.png" class="note n24" alt="">
  </div>

  <div class="page-wrap">
    <div class="card">
      <div class="logo-wrap">
        <img src="farmasi.png" class="logo" alt="Farmasi Logo">
      </div>

      <h2>ტრენინგზე რეგისტრაცია</h2>
      <div class="subtitle">შეავსე ფორმა და დაადასტურე მონაწილეობა</div>

      <div class="stats">
        <div class="stat-box">
          <div class="stat-num" id="totalCount">0</div>
          <div class="stat-label">სულ</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="todayCount">0</div>
          <div class="stat-label">დღეს</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="spotsLeft">-</div>
          <div class="stat-label">დარჩა</div>
        </div>
      </div>

      <div id="countdown" class="countdown-calendar">
        <div class="cd-box">
          <span id="cdDays">0</span>
          <small>დღე</small>
        </div>
        <div class="cd-box">
          <span id="cdHours">0</span>
          <small>საათი</small>
        </div>
        <div class="cd-box">
          <span id="cdMinutes">0</span>
          <small>წუთი</small>
        </div>
        <div class="cd-box">
          <span id="cdSeconds">0</span>
          <small>წამი</small>
        </div>
      </div>

      <div class="event">
        <b>📍 ღონისძიების დეტალები</b>
        <div id="eventCity">📍 ქალაქი: იტვირთება...</div>
        <div id="eventDate">📅 თარიღი: ...</div>
        <div id="eventTime">🕒 დრო: ...</div>
        <div id="eventLocation">🏢 ლოკაცია: ...</div>
      </div>

      <form id="form">
        <input name="first_name" placeholder="სახელი" required>
        <input name="last_name" placeholder="გვარი" required>
        <input name="phone" placeholder="ტელეფონი (599123456)" required>
        <button id="btn" type="submit">დარეგისტრირება</button>
      </form>

      <div id="success" class="msg success"></div>
      <div id="error" class="msg error"></div>

      <div class="trust-line">✅ რეგისტრაციის შემდეგ მიიღებთ დადასტურებას SMS-ით</div>
    </div>
  </div>

  <audio id="bgMusic" loop preload="auto">
    <source src="music.mp3" type="audio/mpeg">
  </audio>

  <button type="button" onclick="toggleMusic()" id="musicBtn">🔊 მუსიკა</button>

  <script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbx2-A17Ti-KtfhO46kfgBhCYzxSI3UL_17LU2F3afDjpePKQexoa89Dfdv2pPdbHZw2/exec";

    let countdownInterval = null;

    const form = document.getElementById("form");
    const btn = document.getElementById("btn");
    const successBox = document.getElementById("success");
    const errorBox = document.getElementById("error");

    function toggleMusic() {
      const music = document.getElementById("bgMusic");
      const musicBtn = document.getElementById("musicBtn");

      if (music.paused) {
        music.play()
          .then(function () {
            musicBtn.innerText = "🔇 გამორთვა";
          })
          .catch(function () {});
      } else {
        music.pause();
        musicBtn.innerText = "🔊 მუსიკა";
      }
    }

    function parseEventDateTime(dateStr, timeStr) {
      return new Date(dateStr + "T" + timeStr + ":00");
    }

    function startCountdown(dateStr, timeStr) {
      const daysEl = document.getElementById("cdDays");
      const hoursEl = document.getElementById("cdHours");
      const minutesEl = document.getElementById("cdMinutes");
      const secondsEl = document.getElementById("cdSeconds");
      const countdownWrap = document.getElementById("countdown");

      if (countdownInterval) clearInterval(countdownInterval);

      const target = parseEventDateTime(dateStr, timeStr);

      if (isNaN(target.getTime())) {
        daysEl.innerText = "-";
        hoursEl.innerText = "-";
        minutesEl.innerText = "-";
        secondsEl.innerText = "-";
        return;
      }

      function updateCountdown() {
        const now = new Date();
        const diff = target - now;

        if (diff <= 0) {
          daysEl.innerText = "0";
          hoursEl.innerText = "0";
          minutesEl.innerText = "0";
          secondsEl.innerText = "0";
          clearInterval(countdownInterval);
          return;
        }

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
        const minutes = Math.floor((diff / (1000 * 60)) % 60);
        const seconds = Math.floor((diff / 1000) % 60);

        daysEl.innerText = days;
        hoursEl.innerText = hours;
        minutesEl.innerText = minutes;
        secondsEl.innerText = seconds;

        if (diff < 3600000) {
          countdownWrap.style.background = "#ffe3e7";
        } else {
          countdownWrap.style.background = "rgba(255,255,255,0.42)";
        }
      }

      updateCountdown();
      countdownInterval = setInterval(updateCountdown, 1000);
    }

    function successExplosion() {
      for (let i = 0; i < 12; i++) {
        const img = document.createElement("img");
        img.src = i % 2 === 0 ? "gel100.png" : "usd100.png";
        img.style.position = "fixed";
        img.style.left = "50%";
        img.style.top = "50%";
        img.style.width = "82px";
        img.style.zIndex = "99999";
        img.style.pointerEvents = "none";
        document.body.appendChild(img);

        const x = (Math.random() - 0.5) * 520;
        const y = (Math.random() - 0.5) * 420;

        img.animate(
          [
            { transform: "translate(-50%, -50%) scale(1)", opacity: 1 },
            { transform: "translate(" + x + "px, " + y + "px) scale(0.7)", opacity: 0 }
          ],
          {
            duration: 900,
            easing: "ease-out"
          }
        );

        setTimeout(function () {
          img.remove();
        }, 900);
      }
    }

    function loadEvent() {
      const oldScript = document.getElementById("jsonpLoader");
      if (oldScript) oldScript.remove();

      const script = document.createElement("script");
      script.id = "jsonpLoader";
      script.src = SCRIPT_URL + "?callback=handleData&t=" + Date.now();
      document.body.appendChild(script);
    }

    function handleData(data) {
      if (!data || !data.ok) {
        document.getElementById("eventCity").innerText = "❌ ვერ ჩაიტვირთა";
        document.getElementById("eventDate").innerText = "📅 თარიღი: ---";
        document.getElementById("eventTime").innerText = "🕒 დრო: ---";
        document.getElementById("eventLocation").innerText = "🏢 ლოკაცია: ---";
        document.getElementById("cdDays").innerText = "-";
        document.getElementById("cdHours").innerText = "-";
        document.getElementById("cdMinutes").innerText = "-";
        document.getElementById("cdSeconds").innerText = "-";
        return;
      }

      document.getElementById("eventCity").innerText = "📍 ქალაქი: " + data.city;
      document.getElementById("eventDate").innerText = "📅 თარიღი: " + data.date;
      document.getElementById("eventTime").innerText = "🕒 დრო: " + data.time;
      document.getElementById("eventLocation").innerText = "🏢 ლოკაცია: " + data.location;

      document.getElementById("totalCount").innerText = data.totalRegistrations || 0;
      document.getElementById("todayCount").innerText = data.todayRegistrations || 0;
      document.getElementById("spotsLeft").innerText = data.spotsLeft === null ? "∞" : data.spotsLeft;

      const spotsEl = document.getElementById("spotsLeft");
      if (data.spotsLeft !== null && data.spotsLeft <= 10) {
        spotsEl.style.color = "#d73d51";
        spotsEl.style.textShadow = "0 0 12px rgba(215,61,81,0.28)";
      } else {
        spotsEl.style.color = "";
        spotsEl.style.textShadow = "";
      }

      startCountdown(data.date, data.time);
    }

    window.handleData = handleData;

    form.addEventListener("submit", async function (e) {
      e.preventDefault();

      successBox.style.display = "none";
      errorBox.style.display = "none";

      btn.disabled = true;
      btn.innerText = "იგზავნება...";

      try {
        const res = await fetch(SCRIPT_URL, {
          method: "POST",
          body: new FormData(form)
        });

        const text = (await res.text()).trim();

        if (text === "success") {
          form.reset();
          successBox.innerText = "რეგისტრაცია წარმატებულია ✅";
          successBox.style.display = "block";
          successExplosion();
          setTimeout(loadEvent, 800);
        } else if (text === "duplicate") {
          errorBox.innerText = "ეს ნომერი უკვე დარეგისტრირებულია ❌";
          errorBox.style.display = "block";
        } else if (text === "invalid") {
          errorBox.innerText = "არასწორი ნომერი ❌";
          errorBox.style.display = "block";
        } else if (text === "closed") {
          errorBox.innerText = "რეგისტრაცია დახურულია ❌";
          errorBox.style.display = "block";
        } else if (text === "full") {
          errorBox.innerText = "ადგილები აღარ არის ❌";
          errorBox.style.display = "block";
        } else if (text === "sms error") {
          errorBox.innerText = "SMS ვერ გაიგზავნა ❌";
          errorBox.style.display = "block";
        } else {
          errorBox.innerText = "შეცდომა ❌";
          errorBox.style.display = "block";
        }
      } catch (err) {
        errorBox.innerText = "სერვერთან კავშირი ვერ მოხერხდა ❌";
        errorBox.style.display = "block";
      }

      btn.disabled = false;
      btn.innerText = "დარეგისტრირება";
    });

    function showLivePopup() {
      const names = ["ნინო", "მარი", "თამარი", "გიორგი", "ანა", "ლაშა", "სალომე", "დავით", "ელენე"];
      const cities = ["თბილისი", "ბათუმი", "ქუთაისი", "რუსთავი", "ზუგდიდი"];

      const name = names[Math.floor(Math.random() * names.length)];
      const city = cities[Math.floor(Math.random() * cities.length)];

      const popup = document.createElement("div");
      popup.className = "live-popup";
      popup.innerText = "🔥 " + name + " • " + city + " • ახლახანს დარეგისტრირდა";

      document.body.appendChild(popup);
      setTimeout(function () {
        popup.remove();
      }, 2800);
    }

    loadEvent();
    setInterval(loadEvent, 30000);
    setInterval(showLivePopup, 10000);
  </script>
</body>
</html>
